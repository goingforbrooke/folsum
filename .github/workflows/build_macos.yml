name: Build, Bundle, and Publish for macOS
on:
  push:
    branches:
      - main
      - 'cicd/**'
jobs:
  build:
    runs-on: macos-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.3
      - name: Install Rust toolchain with M1 chip support
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-apple-darwin
      - name: Build x86_64 binary
        run: cargo build --release --target x86_64-apple-darwin
      - name: Build ARM64 binary
        run: cargo build --release --target aarch64-apple-darwin
      - name: Create a universal binary from the x86_64 and ARM64 binaries
        run: lipo -create -output directory_summarizer -arch x86_64 target/x86_64-apple-darwin/release/directory_summarizer -arch arm64 target/aarch64-apple-darwin/release/directory_summarizer
      - name: Create *.app folder structure
        run: mkdir -p directory_summarizer.app/Contents/MacOS
      - name: Move binary into the *.app folder
        run: cp directory_summarizer directory_summarizer.app/Contents/MacOS/directory_summarizer
      - name: Codesign app bundle
        env: 
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
        run: |
          # Convert base64-encoded certificate back to .p12 file.
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12

          # Create a new keychain so no UI dialogs are generated.
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain 
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

          # Codesign the app bundle with hardened runtime so it passes notarization.
          /usr/bin/codesign --force -s "$MACOS_CERTIFICATE_NAME" --options runtime directory_summarizer.app -v
      - name: "Notarize app bundle"
        env:
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
        run: |
          # Prevent UI password dialog by storing notarization credentials.
          echo "Create keychain profile"
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"

          # We can't notarize an app bundle directly, but we need to compress it as an archive.
          # Compress app bundle to zip file for notarization (because we can't notarize app bundles directly).

          echo "Creating temporary notarization archive"
          ditto -c -k --keepParent "directory_summarizer.app" "notarization.zip"

          # Send the notarization request to the Apple's Notarization service.
          echo "Notarizing compressed app bundle"
          xcrun notarytool submit "notarization.zip" --keychain-profile "notarytool-profile" --wait

          # "Attach the staple" to executable for offline MacOS validation.
          echo "Attach staple"
          xcrun stapler staple "directory_summarizer.app"
      - name: Compress *.app directory to *.zip, preserving resource fork and Finder information
        run: ditto -c -k --sequesterRsrc --keepParent directory_summarizer.app directory_summarizer.zip
      - name: Install `cargo-edit` for version bumping with `cargo set-version`
        run: cargo install cargo-edit
      - name: Increment minor version in Cargo.toml
        run: cargo set-version --bump minor
      - name: Get current SemVer version from Cargo.toml
        id: get_current_semver
        run: echo "semver=v$(cargo metadata --format-version 1 | jq -r '.packages | .[] | select(.name=="directory_summarizer") | .version')" >> "$GITHUB_OUTPUT"
      - name: Commit minor version bump
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          file_pattern: Cargo.toml
          commit_message: Increment minor version from ${{ steps.get_current_semver.outputs.semver }} to ${{ steps.get_bumped_semver.outputs.semver }}
      - name: Get bumped SemVer version from Cargo.toml
        id: get_bumped_semver
        run: echo "semver=v$(cargo metadata --format-version 1 | jq -r '.packages | .[] | select(.name=="directory_summarizer") | .version')" >> "$GITHUB_OUTPUT"
      - name: Publish a new release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.get_bumped_semver.outputs.semver }}
          commit: main
          artifacts: directory_summarizer.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            # New Release ${{ steps.get_bumped_semver.outputs.semver }}

            This is a new release of Directory Summarizer.

            ## Changelog

            - Add feature X
            - Fix bug Y
